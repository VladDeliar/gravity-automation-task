# Локальний стек для тесту на ПК (Docker Desktop):
#   n8n (автоматизація)  → http://localhost:5678
#   WordPress (Частина 2) → http://localhost:8080
# Запуск:  docker compose up -d
# WordPress і n8n у спільній мережі, тож форма WP шле заявку на http://n8n:5678/webhook/gravity-lead
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: gravity-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false          # дозволяє логін по http на localhost
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=true    # захист увімкнено: ноди не читають env
      - GENERIC_TIMEZONE=Europe/Kyiv
      - TZ=Europe/Kyiv
      # Gemini-ключ тепер у n8n-credential, chatId захардкоджено у ноді Telegram —
      # env-змінні для workflow більше не потрібні.
    volumes:
      - ./n8n-data:/home/node/.n8n

  db:
    image: mariadb:11
    container_name: gravity-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpress
      - MYSQL_RANDOM_ROOT_PASSWORD=1
    volumes:
      - db-data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: gravity-wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wp-data:/var/www/html

volumes:
  db-data:
  wp-data:
